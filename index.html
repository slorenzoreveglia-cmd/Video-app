<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven Universe Vault - Database</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        body.logged-in { background: #f4f7f0; color: #4b6337; }
        .container { max-width: 600px; margin: auto; }
        .box { background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e0ebd5; color: #333; }
        .login-box { background: #2c2c2c; color: white; text-align: center; margin-top: 50px; }
        input { padding: 15px; width: 85%; border-radius: 12px; border: 1px solid #ddd; margin: 15px 0; font-size: 18px; text-align: center; }
        button.primary-btn { background: #b0c994; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-tiny { background: #e8f0df; color: #6b8254; font-size: 10px; padding: 7px 12px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .season-tab { background: #ffffff; color: #6b8254; padding: 18px; border-radius: 15px; margin-top: 10px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; border: 1px solid #e0ebd5; }
        .episode-list { display: none; background: #ffffff; padding: 5px; border-radius: 0 0 15px 15px; border: 1px solid #e0ebd5; border-top: none; }
        .episode-item { padding: 15px; border-bottom: 1px solid #f4f7f0; cursor: pointer; color: #4b6337; text-align: left; }
        video { width: 100%; border-radius: 12px; margin-top: 10px; display: none; background: #000; }
    </style>
</head>
<body id="body-tag">

    <div class="container">
        <div id="pin-section" class="box login-box">
            <h2>Steven Vault 🔑</h2>
            <input type="tel" id="pin-input" maxlength="8" placeholder="Inserisci PIN">
            <br><br>
            <button class="primary-btn" onclick="checkPin()">Entra</button>
        </div>

        <div id="main-app" style="display:none;">
            <div class="top-bar">
                <button class="btn-tiny" onclick="resetPin()">⚙️ Cambia PIN</button>
            </div>
            <div id="seasons-container"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // DATABASE VIDEO (AGGIORNATO DAL TUO FOGLIO)
        // ==========================================
        const DATABASE_VIDEO = [
            { name: "01x01 Gemma lucente - Gem Glow", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987419/Steven.Universe.01x01.Gemma.Lucente.Gem.Glow_jxffcb.mp4" },
            { name: "01x34 Cocomerino - Watermelon Steven", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987309/Steven.Universe.01x34.Cocomerino.Il.Cocomero.Bambino.Waterme_bka5cy.mp4" },
            { name: "01x38 Il Test - The Test", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987305/Steven.Universe.01x38.Il.Test.The.Test.2345485.mkv.mp4_at_St_bdoiwl.mp4" },
            { name: "01x43 Capodanno - Maximum Capacity", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987518/Steven.Universe.01x43.Capodanno.Maximum.Capacity.2345490.mkv_r5wmcl.mp4" },
            { name: "01x46 Libro aperto - Open Book", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987412/Steven.Universe.01x46.Lib.Aperto.Open.Book.2345493.mkv_f0e8of.mp4" },
            { name: "01x47 Una magica amicizia - Shirt Club", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987413/Steven.Universe.01x47.Magica.Amicizia.Shirt.Club.2345494.mkv_o39gex.mp4" },
            { name: "01x48 Una storia per Steven - Story for Steven", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987422/Steven.Universe.01x48.Una.Storia.Per.Steven.Story.For.Steven.2345495.mkv_wukfdf.mp4" },
            { name: "01x49 Il messaggio - The Message", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987324/Steven.Universe.01x49.Il.Messaggio.The.Message.2345496.mkv_e367cl.mp4" },
            { name: "01x50 Potere politico - Political Power", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987522/Steven.Universe.01x50.Potere.Politico.Political.Power.2345497.mkv_qg318b.mp4" },
            { name: "01x51 Il ritorno - The Return", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987525/Steven.Universe.01x51.Il.Ritorno.The.Return.2345498.mkv_vuvndy.mp4" },
            { name: "01x52 Fuggitivi - Jail Break", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987528/Steven.Universe.01x52.Fuggitivi.Jail.Break.2345499.mkv_e9zshk.mp4" },
            { name: "03x01 L'isola dei super cocomeri - Super Watermelon Island", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772970695/Steven.Universe.03x01.L.Isola.Dei.Super.Cocomeri.Super.Water_bpeolj.mp4" }
        ];

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            const saved = localStorage.getItem('user_pin') || "1234";
            if (input === saved) {
                document.getElementById('pin-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('body-tag').classList.add('logged-in');
                renderizzaStagioni();
            } else { alert("PIN Errato!"); }
        }

        function resetPin() { 
            let nuovo = prompt("Nuovo PIN:");
            if(nuovo) { localStorage.setItem('user_pin', nuovo); alert("PIN aggiornato!"); }
        }

        function renderizzaStagioni() {
            const container = document.getElementById('seasons-container');
            container.innerHTML = "";
            const stagioni = [
                {id:"01", n:"Stagione 1"}, {id:"02", n:"Stagione 2"}, {id:"03", n:"Stagione 3"},
                {id:"04", n:"Stagione 4"}, {id:"05", n:"Stagione 5"}, {id:"Film", n:"Film"}, {id:"Future", n:"Future"}
            ];

            stagioni.forEach(cat => {
                const filtrati = DATABASE_VIDEO.filter(v => {
                    const nome = v.name.toLowerCase();
                    if (!isNaN(cat.id)) return nome.includes(cat.id + "x");
                    return nome.includes(cat.id.toLowerCase());
                });

                if (filtrati.length === 0) return;

                const tab = document.createElement('div');
                tab.className = 'season-tab';
                tab.innerHTML = `<span>📂 ${cat.n}</span> <span>${filtrati.length} ▼</span>`;
                tab.onclick = () => {
                    const list = tab.nextElementSibling;
                    const isVis = list.style.display === 'block';
                    document.querySelectorAll('.episode-list').forEach(l => l.style.display = 'none');
                    list.style.display = isVis ? 'none' : 'block';
                };

                const list = document.createElement('div');
                list.className = 'episode-list';
                filtrati.forEach((vid, i) => {
                    const item = document.createElement('div');
                    item.className = 'episode-item';
                    item.innerHTML = `🎬 ${vid.name}`;
                    const vTag = document.createElement('video');
                    vTag.controls = true; vTag.src = vid.url;
                    item.onclick = (e) => { 
                        e.stopPropagation(); 
                        const isVis = vTag.style.display === 'block';
                        document.querySelectorAll('video').forEach(v => { v.style.display='none'; v.pause(); });
                        vTag.style.display = isVis ? 'none' : 'block';
                    };
                    item.appendChild(vTag);
                    list.appendChild(item);
                });
                container.appendChild(tab); container.appendChild(list);
            });
        }
    </script>
</body>
</html>
