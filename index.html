<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven Universe Vault - Real Colors</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; transition: 0.4s; background: #1a1a1a; color: white; }
        .container { max-width: 600px; margin: auto; }
        
        /* LOGIN */
        .login-box { background: #2c2c2c; text-align: center; margin-top: 50px; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 15px; width: 80%; border-radius: 15px; border: none; margin: 15px 0; font-size: 18px; text-align: center; }
        button.primary-btn { border: none; padding: 15px 35px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* INTERFACCIA */
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 10px; }
        .btn-tiny { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 11px; opacity: 0.9; }

        .season-tab { padding: 20px; border-radius: 20px; margin-top: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .episode-list { display: none; padding: 10px; border-radius: 0 0 20px 20px; margin-top: -10px; }
        .episode-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 0.95em; }

        video { width: 100%; border-radius: 15px; margin-top: 10px; display: none; background: #000; }

        /* ==========================================
           I TUOI COLORI (ESTRATTI DALLE FOTO)
           ========================================== */
        
        /* Tema 1: Rosa Steven (Foto 1/5) */
        body.theme-1.logged-in { background: #FFD1DC; color: #D1477A; }
        body.theme-1 .season-tab, body.theme-1 .episode-list { background: #FF69B4; color: white; }
        body.theme-1 button.primary-btn { background: #FF1493; color: white; }
        body.theme-1 .btn-tiny { background: #D1477A; color: white; }

        /* Tema 2: Blu Profondo (Foto 2/7) */
        body.theme-2.logged-in { background: #E0F2F1; color: #006064; }
        body.theme-2 .season-tab, body.theme-2 .episode-list { background: #00ACC1; color: white; }
        body.theme-2 button.primary-btn { background: #00838F; color: white; }
        body.theme-2 .btn-tiny { background: #006064; color: white; }

        /* Tema 3: Verde Peridoto (Foto 3/8) */
        body.theme-3.logged-in { background: #F1F8E9; color: #33691E; }
        body.theme-3 .season-tab, body.theme-3 .episode-list { background: #7CB342; color: white; }
        body.theme-3 button.primary-btn { background: #558B2F; color: white; }
        body.theme-3 .btn-tiny { background: #33691E; color: white; }

        /* Tema 4: Viola Cratere (Foto 4/6) */
        body.theme-4.logged-in { background: #F3E5F5; color: #4A148C; }
        body.theme-4 .season-tab, body.theme-4 .episode-list { background: #AB47BC; color: white; }
        body.theme-4 button.primary-btn { background: #8E24AA; color: white; }
        body.theme-4 .btn-tiny { background: #4A148C; color: white; }

        /* Tema 5: Giallo Cartoon */
        body.theme-5.logged-in { background: #FFFDE7; color: #F57F17; }
        body.theme-5 .season-tab, body.theme-5 .episode-list { background: #FDD835; color: #5D4037; }
        body.theme-5 button.primary-btn { background: #FBC02D; color: #5D4037; }
        body.theme-5 .btn-tiny { background: #F57F17; color: white; }
    </style>
</head>
<body id="body-tag">

    <div class="container">
        <div id="pin-section" class="box login-box">
            <h1 style="color:white; margin-bottom:10px;">Steven Vault 💎</h1>
            <p style="color:#aaa; font-size:14px;">Inserisci il codice segreto</p>
            <input type="tel" id="pin-input" maxlength="8" placeholder="****">
            <br><br>
            <button class="primary-btn" onclick="checkPin()">ACCEDI</button>
        </div>

        <div id="main-app" style="display:none;">
            <div class="top-bar">
                <button class="btn-tiny" id="theme-btn">🎨 CAMBIA COLORE</button>
                <button class="btn-tiny" onclick="resetPin()">⚙️ PIN</button>
            </div>
            <div id="seasons-container"></div>
        </div>
    </div>

    <script>
        // IL TUO DATABASE
        const DATABASE_VIDEO = [
            { name: "01x01 Gemma lucente", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987419/Steven.Universe.01x01.Gemma.Lucente.Gem.Glow_jxffcb.mp4" },
            { name: "01x34 Cocomerino", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987309/Steven.Universe.01x34.Cocomerino.Il.Cocomero.Bambino.Waterme_bka5cy.mp4" },
            { name: "01x38 Il Test", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987305/Steven.Universe.01x38.Il.Test.The.Test.2345485.mkv.mp4_at_St_bdoiwl.mp4" },
            { name: "01x43 Capodanno", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987518/Steven.Universe.01x43.Capodanno.Maximum.Capacity.2345490.mkv_r5wmcl.mp4" },
            { name: "01x46 Libro aperto", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987412/Steven.Universe.01x46.Lib.Aperto.Open.Book.2345493.mkv_f0e8of.mp4" },
            { name: "01x47 Una magica amicizia", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987413/Steven.Universe.01x47.Magica.Amicizia.Shirt.Club.2345494.mkv_o39gex.mp4" },
            { name: "01x48 Una storia per Steven", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987422/Steven.Universe.01x48.Una.Storia.Per.Steven.Story.For.Steven.2345495.mkv_wukfdf.mp4" },
            { name: "01x49 Il messaggio", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987324/Steven.Universe.01x49.Il.Messaggio.The.Message.2345496.mkv_e367cl.mp4" },
            { name: "01x50 Potere politico", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987522/Steven.Universe.01x50.Potere.Politico.Political.Power.2345497.mkv_qg318b.mp4" },
            { name: "01x51 Il ritorno", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987525/Steven.Universe.01x51.Il.Ritorno.The.Return.2345498.mkv_vuvndy.mp4" },
            { name: "01x52 Fuggitivi", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987528/Steven.Universe.01x52.Fuggitivi.Jail.Break.2345499.mkv_e9zshk.mp4" },
            { name: "03x01 L'isola dei super cocomeri", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772970695/Steven.Universe.03x01.L.Isola.Dei.Super.Cocomeri.Super.Water_bpeolj.mp4" }
        ];

        let currentTheme = parseInt(localStorage.getItem('user_theme')) || 1;
        document.body.classList.add(`theme-${currentTheme}`);

        document.getElementById('theme-btn').onclick = () => {
            document.body.classList.remove(`theme-${currentTheme}`);
            currentTheme = (currentTheme % 5) + 1;
            document.body.classList.add(`theme-${currentTheme}`);
            localStorage.setItem('user_theme', currentTheme);
        };

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            const saved = localStorage.getItem('user_pin') || "1234";
            if (input === saved) {
                document.getElementById('pin-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.body.classList.add('logged-in');
                renderizzaStagioni();
            } else { alert("PIN Errato!"); }
        }

        function resetPin() { 
            let nuovo = prompt("Nuovo PIN:");
            if(nuovo) { localStorage.setItem('user_pin', nuovo); alert("PIN aggiornato!"); }
        }

        function renderizzaStagioni() {
            const container = document.getElementById('seasons-container');
            container.innerHTML = "";
            const stagioni = [{id:"01",n:"Stagione 1"},{id:"03",n:"Stagione 3"}];

            stagioni.forEach(cat => {
                const filtrati = DATABASE_VIDEO.filter(v => v.name.includes(cat.id + "x"));
                if (filtrati.length === 0) return;

                const tab = document.createElement('div');
                tab.className = 'season-tab';
                tab.innerHTML = `<span>📂 ${cat.n}</span> <span>${filtrati.length} ep. ▼</span>`;
                tab.onclick = () => {
                    const list = tab.nextElementSibling;
                    list.style.display = list.style.display === 'block' ? 'none' : 'block';
                };

                const list = document.createElement('div');
                list.className = 'episode-list';
                
                filtrati.forEach((vid, i) => {
                    const item = document.createElement('div');
                    item.className = 'episode-item';
                    
                    // NOME PULITO: Ep. X Titolo
                    let num = vid.name.split('x')[1]?.split(' ')[0];
                    let titolo = vid.name.split(' ').slice(1).join(' ');
                    item.innerHTML = `🎬 <b>Ep. ${parseInt(num)}</b> ${titolo}`;
                    
                    const vTag = document.createElement('video');
                    vTag.controls = true; vTag.src = vid.url;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        const isVis = vTag.style.display === 'block';
                        document.querySelectorAll('video').forEach(v => { v.style.display='none'; v.pause(); });
                        vTag.style.display = isVis ? 'none' : 'block';
                    };
                    item.appendChild(vTag);
                    list.appendChild(item);
                });
                container.appendChild(tab); container.appendChild(list);
            });
        }
    </script>
</body>
</html>
