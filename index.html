<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven Universe Vault - 18 Themes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; transition: 0.5s; background: #1a1a1a; color: white; min-height: 100vh; }
        .container { max-width: 600px; margin: auto; }
        
        .login-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: center; margin-top: 50px; border-radius: 30px; padding: 40px; border: 1px solid rgba(255,255,255,0.2); }
        input { padding: 15px; width: 80%; border-radius: 15px; border: none; margin: 15px 0; font-size: 18px; text-align: center; background: white; color: #333; }
        
        button.primary-btn { border: none; padding: 15px 35px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; color: white; text-transform: uppercase; }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .theme-counter { font-size: 12px; font-weight: bold; opacity: 0.8; text-transform: uppercase; margin-bottom: 5px; text-align: right; }
        .btn-tiny { padding: 10px 18px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; color: white; background: rgba(0,0,0,0.3); }

        .season-tab { padding: 22px; border-radius: 20px; margin-top: 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .episode-list { display: none; padding: 10px; border-radius: 0 0 20px 20px; margin-top: -10px; background: rgba(255,255,255,0.05); }
        .episode-item { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 1em; display: flex; align-items: center; gap: 10px; }
        
        video { width: 100%; border-radius: 20px; margin-top: 10px; display: none; background: #000; border: 2px solid rgba(255,255,255,0.2); }

        /* ==========================================
           18 TEMI: 1-9 (INTENSI) | 10-18 (PASTELLO)
           ========================================== */

        /* --- BLU VIOLACEI --- */
        body.theme-1.logged-in { background: #1e1b4b; color: #e0e7ff; } body.theme-1 .season-tab { background: linear-gradient(135deg, #4338ca, #6d28d9); }
        body.theme-10.logged-in { background: #eef2ff; color: #4338ca; } body.theme-10 .season-tab { background: #c7d2fe; color: #3730a3; }

        body.theme-2.logged-in { background: #2e1065; color: #f5f3ff; } body.theme-2 .season-tab { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
        body.theme-11.logged-in { background: #f5f3ff; color: #6d28d9; } body.theme-11 .season-tab { background: #ddd6fe; color: #5b21b6; }

        /* --- ROSINI ROSSACEI --- */
        body.theme-3.logged-in { background: #450a0a; color: #fef2f2; } body.theme-3 .season-tab { background: linear-gradient(135deg, #991b1b, #dc2626); }
        body.theme-12.logged-in { background: #fef2f2; color: #b91c1c; } body.theme-12 .season-tab { background: #fecaca; color: #991b1b; }

        body.theme-4.logged-in { background: #500724; color: #fff1f2; } body.theme-4 .season-tab { background: linear-gradient(135deg, #be123c, #fb7185); }
        body.theme-13.logged-in { background: #fff1f2; color: #be123c; } body.theme-13 .season-tab { background: #fecdd3; color: #9f1239; }

        /* --- ROSA VIOLA --- */
        body.theme-5.logged-in { background: #2d0630; color: #fae8ff; } body.theme-5 .season-tab { background: linear-gradient(135deg, #701a75, #d946ef); }
        body.theme-14.logged-in { background: #fdf4ff; color: #a21caf; } body.theme-14 .season-tab { background: #f5d0fe; color: #701a75; }

        body.theme-6.logged-in { background: #4c0519; color: #fff1f2; } body.theme-6 .season-tab { background: linear-gradient(135deg, #881337, #db2777); }
        body.theme-15.logged-in { background: #fff1f2; color: #db2777; } body.theme-15 .season-tab { background: #fbcfe8; color: #9d174d; }

        /* --- TURCHESE COBALTO --- */
        body.theme-7.logged-in { background: #083344; color: #ecfeff; } body.theme-7 .season-tab { background: linear-gradient(135deg, #0e7490, #0891b2); }
        body.theme-16.logged-in { background: #ecfeff; color: #0891b2; } body.theme-16 .season-tab { background: #cffafe; color: #0e7490; }

        body.theme-8.logged-in { background: #0c4a6e; color: #f0f9ff; } body.theme-8 .season-tab { background: linear-gradient(135deg, #0369a1, #0284c7); }
        body.theme-17.logged-in { background: #f0f9ff; color: #0284c7; } body.theme-17 .season-tab { background: #bae6fd; color: #0369a1; }

        body.theme-9.logged-in { background: #042f2e; color: #f0fdfa; } body.theme-9 .season-tab { background: linear-gradient(135deg, #0f766e, #14b8a6); }
        body.theme-18.logged-in { background: #f0fdfa; color: #0d9488; } body.theme-18 .season-tab { background: #ccfbf1; color: #0f766e; }

        /* Colore tasti principale dinamico */
        body.logged-in button.primary-btn { background: currentColor; filter: brightness(0.8); color: white; }
    </style>
</head>
<body id="body-tag">

    <div class="container">
        <div id="pin-section" class="login-box">
            <h1 style="margin:0;">STEVEN VAULT</h1>
            <p style="opacity:0.7">Inserisci il PIN</p>
            <input type="tel" id="pin-input" maxlength="8" placeholder="****">
            <br>
            <button class="primary-btn" onclick="checkPin()">Accedi</button>
        </div>

        <div id="main-app" style="display:none;">
            <div class="top-bar">
                <button class="btn-tiny" onclick="resetPin()">⚙️ PIN</button>
                <div style="text-align:right;">
                    <div class="theme-counter" id="theme-num">Tema attuale: 1</div>
                    <button class="btn-tiny" id="theme-btn" style="background: white; color: black;">🎨 CAMBIA COLORE</button>
                </div>
            </div>
            <div id="seasons-container"></div>
        </div>
    </div>

    <script>
        const DATABASE_VIDEO = [
            { name: "01x01 Gemma lucente", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987419/Steven.Universe.01x01.Gemma.Lucente.Gem.Glow_jxffcb.mp4" },
            { name: "01x34 Cocomerino", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987309/Steven.Universe.01x34.Cocomerino.Il.Cocomero.Bambino.Waterme_bka5cy.mp4" },
            { name: "01x38 Il Test", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987305/Steven.Universe.01x38.Il.Test.The.Test.2345485.mkv.mp4_at_St_bdoiwl.mp4" },
            { name: "01x43 Capodanno", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987518/Steven.Universe.01x43.Capodanno.Maximum.Capacity.2345490.mkv_r5wmcl.mp4" },
            { name: "01x46 Libro aperto", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987412/Steven.Universe.01x46.Lib.Aperto.Open.Book.2345493.mkv_f0e8of.mp4" },
            { name: "01x47 Una magica amicizia", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987413/Steven.Universe.01x47.Magica.Amicizia.Shirt.Club.2345494.mkv_o39gex.mp4" },
            { name: "01x48 Una storia per Steven", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987422/Steven.Universe.01x48.Una.Storia.Per.Steven.Story.For.Steven.2345495.mkv_wukfdf.mp4" },
            { name: "01x49 Il messaggio", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987324/Steven.Universe.01x49.Il.Messaggio.The.Message.2345496.mkv_e367cl.mp4" },
            { name: "01x50 Potere politico", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987522/Steven.Universe.01x50.Potere.Politico.Political.Power.2345497.mkv_qg318b.mp4" },
            { name: "01x51 Il ritorno", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987525/Steven.Universe.01x51.Il.Ritorno.The.Return.2345498.mkv_vuvndy.mp4" },
            { name: "01x52 Fuggitivi", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772987528/Steven.Universe.01x52.Fuggitivi.Jail.Break.2345499.mkv_e9zshk.mp4" },
            { name: "03x01 L'isola dei super cocomeri", url: "https://res.cloudinary.com/dcsvok2jp/video/upload/v1772970695/Steven.Universe.03x01.L.Isola.Dei.Super.Cocomeri.Super.Water_bpeolj.mp4" }
        ];

        let currentTheme = parseInt(localStorage.getItem('user_theme')) || 1;
        document.body.classList.add(`theme-${currentTheme}`);
        document.getElementById('theme-num').innerText = `Tema attuale: ${currentTheme}`;

        document.getElementById('theme-btn').onclick = () => {
            document.body.classList.remove(`theme-${currentTheme}`);
            currentTheme = (currentTheme % 18) + 1;
            document.body.classList.add(`theme-${currentTheme}`);
            localStorage.setItem('user_theme', currentTheme);
            document.getElementById('theme-num').innerText = `Tema attuale: ${currentTheme}`;
        };

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            const saved = localStorage.getItem('user_pin') || "1234";
            if (input === saved) {
                document.getElementById('pin-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.body.classList.add('logged-in');
                renderizzaStagioni();
            } else { alert("PIN Errato!"); }
        }

        function resetPin() { 
            let nuovo = prompt("Nuovo PIN:");
            if(nuovo) { localStorage.setItem('user_pin', nuovo); alert("PIN aggiornato!"); }
        }

        function renderizzaStagioni() {
            const container = document.getElementById('seasons-container');
            container.innerHTML = "";
            const stagioni = [{id:"01",n:"Stagione 1"},{id:"03",n:"Stagione 3"}];
            stagioni.forEach(cat => {
                const filtrati = DATABASE_VIDEO.filter(v => v.name.includes(cat.id + "x"));
                if (filtrati.length === 0) return;
                const tab = document.createElement('div');
                tab.className = 'season-tab';
                tab.innerHTML = `<span>📂 ${cat.n}</span> <span>${filtrati.length} ep.</span>`;
                tab.onclick = () => {
                    const list = tab.nextElementSibling;
                    const isVis = list.style.display === 'block';
                    document.querySelectorAll('.episode-list').forEach(l => l.style.display = 'none');
                    list.style.display = isVis ? 'none' : 'block';
                };
                const list = document.createElement('div');
                list.className = 'episode-list';
                filtrati.forEach((vid, i) => {
                    const item = document.createElement('div');
                    item.className = 'episode-item';
                    let num = vid.name.split('x')[1]?.split(' ')[0];
                    let titolo = vid.name.split(' ').slice(1).join(' ');
                    item.innerHTML = `🎬 <span style="opacity:0.7; margin-right:5px;">Ep. ${parseInt(num)}</span> ${titolo}`;
                    const vTag = document.createElement('video');
                    vTag.controls = true; vTag.src = vid.url;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        const isVis = vTag.style.display === 'block';
                        document.querySelectorAll('video').forEach(v => { v.style.display='none'; v.pause(); });
                        vTag.style.display = isVis ? 'none' : 'block';
                    };
                    item.appendChild(vTag);
                    list.appendChild(item);
                });
                container.appendChild(tab); container.appendChild(list);
            });
        }
    </script>
</body>
</html>
